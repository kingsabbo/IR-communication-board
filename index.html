<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Communication Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <h1>IR Communication Board <span id="pst-clock"></span></h1>
        <button onclick="confirmReset()" class="reset-btn">Clear All Data (New Shift)</button>
    </div>

    <div class="controls">
        <div class="add-section">
            <input type="text" id="newInitials" placeholder="Initials (e.g. JD)" maxlength="2">
            <button onclick="addPerson()" class="add-btn">Add Patient</button>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search Initials, Procedure, or Notes..." onkeyup="render()">
            <button onclick="downloadCSV()" class="export-btn">Download Status Log (CSV)</button>
        </div>
    </div>

    <h2>Active Queue</h2>
    <table id="activeTable">
        <thead>
            <tr>
                <th>Initials</th><th>Bed</th><th>Procedure</th><th>Checked In</th>
                <th>Consented</th><th>IV Access</th><th>Status</th><th>Notes</th>
                <th>Report</th><th>Porter</th><th>Stats (mins)</th>
            </tr>
        </thead>
        <tbody id="activeBody"></tbody>
    </table>

    <hr>

    <h2 style="color: grey;">Discharged</h2>
    <table id="dischargedTable">
        <thead>
            <tr>
                <th>Initials</th><th>Bed</th><th>Procedure</th><th>Stats (mins)</th>
            </tr>
        </thead>
        <tbody id="dischargedBody" class="grey-text"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
