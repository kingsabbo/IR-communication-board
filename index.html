<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Communication Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-overlay">
        <div class="setup-card">
            <h2>IR Communication Board</h2>
            <p>Please select an option to begin today's tracking.</p>
            <button type="button" onclick="createNewDay()" class="add-btn">Create New Day</button>
            <button type="button" onclick="loadExistingDay()" class="export-btn">Load Existing Day</button>
        </div>
    </div>

    <div class="header-container">
        <h1>
            IR Communication Board 
            <span id="pst-clock"></span>
            <span id="board-filename" class="file-label">No file loaded</span>
        </h1>
        <div class="header-btns">
            <span id="save-status">Not Started</span>
            <button type="button" onclick="manualSave()" class="refresh-save-btn no-print">↻ Refresh</button>
            <button type="button" onclick="undoLastAction()" class="undo-btn no-print">↩ Undo</button>
            <button type="button" onclick="redoLastAction()" class="redo-btn no-print">↪ Redo</button>
            <button type="button" onclick="window.print()" class="print-btn">Print Board</button>
        </div>
    </div>

    <div class="controls no-print">
        <div class="add-section">
            <input type="text" id="newInitials" placeholder="Initials" maxlength="2" style="width: 80px;">
            <button type="button" onclick="addPerson()" class="add-btn">Add Patient</button>
        </div>
        <div class="search-section" style="display: flex; align-items: center;">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="render()">
            <button type="button" onclick="clearSearch()" class="reset-btn-small" style="margin-left: 5px;">X</button>
        </div>
    </div>

    <h2>Active Queue: <span id="active-count">0</span></h2>
    <table id="activeTable">
        <thead>
            <tr>
                <th>Pt. Initials</th><th>Bed</th><th>Procedure</th><th>Check-In</th>
                <th>Consent</th><th>IV Access</th><th>Status</th><th>Notes</th>
                <th>Sedation RN</th><th>Scrub RN</th><th>Report</th><th>Porter</th><th>Stats Audit Log</th>
                <th class="no-print">Del</th><th class="no-print">Edit</th><th>Last Saved</th>
            </tr>
        </thead>
        <tbody id="activeBody"></tbody>
    </table>

    <hr>

    <h2 style="color: grey;">Discharged: <span id="discharged-count">0</span></h2>
    <table id="dischargedTable">
        <tbody id="dischargedBody" class="grey-text"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
