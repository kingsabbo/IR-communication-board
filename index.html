<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Communication Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-card">
            <h2>IR Communication Board</h2>
            <p>Please select an option to begin today's tracking.</p>
            <button onclick="createNewDay()" class="add-btn">Create New Day</button>
            <button onclick="loadExistingDay()" class="export-btn">Load Existing Day</button>
        </div>
    </div>

    <div class="header-container">
        <h1>
            IR Communication Board 
            <span id="pst-clock"></span>
            <span id="board-filename" class="file-label">Current board: no file loaded</span>
        </h1>
        <div class="header-btns">
            <span id="save-status">Not Started</span>
            <button onclick="window.print()" class="print-btn">Print Board</button>
            <button onclick="confirmReset()" class="reset-btn">Clear Board</button>
        </div>
    </div>

    <div class="controls no-print">
        <div class="add-section">
            <input type="text" id="newInitials" placeholder="Initials" maxlength="2" style="width: 80px;">
            <button onclick="addPerson()" class="add-btn">Add Patient</button>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search Initials, Procedure, or Notes..." onkeyup="render()">
        </div>
    </div>

    <h2>Active Queue</h2>
    <table id="activeTable">
        <thead>
            <tr>
                <th>Initials</th><th>Bed</th><th>Procedure</th><th>Check-In</th>
                <th>Consent</th><th>IV</th><th>Status</th><th>Notes</th>
                <th>Sedate</th><th>Scrub</th><th>Rep</th><th>Porter</th><th>Stats</th>
                <th class="no-print">Action</th><th>Last Saved</th>
            </tr>
        </thead>
        <tbody id="activeBody"></tbody>
    </table>

    <hr>

    <h2 style="color: grey;">Discharged</h2>
    <table id="dischargedTable">
        <tbody id="dischargedBody" class="grey-text"></tbody>
    </table>

    <div class="print-footer">
        Report Generated: <span id="print-timestamp"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
